# | でペインを縦に分割する（ルート横並びのみ等幅化、入れ子の縦分割は維持）
bind \\ split-window -h \; run-shell "~/.dotfiles/scripts/tmux-balance-horizontal.sh"

# ペインが閉じた時もルート横並びを再バランス
set-hook -g pane-exited 'run-shell "~/.dotfiles/scripts/tmux-balance-horizontal.sh"'
set-hook -g after-kill-pane 'run-shell "~/.dotfiles/scripts/tmux-balance-horizontal.sh"'
# - でペインを横に分割する
bind - split-window -v

# Vimのキーバインドでペインを移動する
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 256色端末 + Kittyのパススルーを許可（image.nvim用）
set -g default-terminal "tmux-256color"
# Kittyのグラフィックパススルーを有効化（tmux 3.3+）
set -g allow-passthrough on
set -as terminal-overrides ',xterm-kitty*:Tc,RGB,AX,Ms,smglr@:smgt@:smgb@:allow-passthrough'
# 念のため全端末にパススルーを許可（非Kittyでも安全な設定）
set -as terminal-overrides ',*:allow-passthrough'

# status line の設定
set -g status off

# 番号詰め
set -g renumber-windows on

# status line の背景色を変更
# set -g status-bg default

# status line の文字の色を変更
# set -g status-fg colour14

set -g status-style "fg=colour14,bg=default"

# ペインのボーダー (アクティブを目立たせる)
set -g pane-border-style 'fg=#5a8497'
set -g pane-active-border-style 'fg=#ff79c6'
set -g pane-border-status bottom
set -g pane-border-format ' #{b:pane_current_path}#(cd "#{pane_current_path}" && git rev-parse --abbrev-ref HEAD 2>/dev/null | sed "s/.*/  &/")#{@claude_anim} '

# キーストロークのディレイを減らす (Escキーの反応を速くする)
set -sg escape-time 1
set -g mouse on

# マウスでのコピーモード改善
# macOSの場合: Optionキーを押しながらドラッグで通常のターミナル選択
# それ以外: tmuxのコピーモードを使用
setw -g mode-keys vi

# マウスドラッグで選択を開始（コピーモードに入る）
bind -n MouseDrag1Pane select-pane \; copy-mode -M

# クリップボードコマンドをOS別に設定
if-shell "uname | grep -q Darwin" \
    "set -g @clipboard_copy 'pbcopy'" \
    "set -g @clipboard_copy 'xclip -selection clipboard'"

# マウスドラッグ終了時にコピー
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# ダブルクリックで単語選択してコピー
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi DoubleClick1Pane select-pane \\; send-keys -X select-word \\; send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi DoubleClick1Pane select-pane \\; send-keys -X select-word \\; send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# トリプルクリックで行選択してコピー
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi TripleClick1Pane select-pane \\; send-keys -X select-line \\; send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi TripleClick1Pane select-pane \\; send-keys -X select-line \\; send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# スクロールでコピーモードに入る
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"

# コピーモードのキーバインド
bind-key -T copy-mode-vi v send-keys -X begin-selection
if-shell "uname | grep -q Darwin" \
    "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'"
if-shell "uname | grep -q Darwin" \
    "bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# ペーストのキーバインド
if-shell "uname | grep -q Darwin" \
    "bind ] run 'pbpaste | tmux load-buffer - && tmux paste-buffer'" \
    "bind ] run 'xclip -selection clipboard -o | tmux load-buffer - && tmux paste-buffer'"

# fzfでセッション選択 (prefix + s)
bind s display-popup -E "tmux list-sessions -F '#{session_name}' | fzf --reverse --header='Switch Session' --preview='tmux capture-pane -ep -t {}' | xargs -I {} tmux switch-client -t {}"

# prefix + m : 現在のペインを別セッションのアクティブウィンドウの「一番右のペイン」の右隣に移動
bind m display-popup -E "\
  cur=\$(tmux display -p '#S'); \
  target=\$(tmux list-sessions -F '#{session_name}' | grep -v \"^\${cur}\$\" | fzf --reverse --header='Move pane to session'); \
  [ -z \"\$target\" ] && exit; \
  rightmost=\$(tmux list-panes -t \"\${target}:\" -F '#{pane_right} #{session_name}:#{window_index}.#{pane_index}' | sort -rn | head -1 | awk '{print \$2}'); \
  tmux move-pane -h -t \"\$rightmost\"; \
  ~/.dotfiles/scripts/tmux-balance-horizontal.sh \"\${target}:\""

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-sidebar'

# Claude Code状態トラッキング（色は触らない、状態env varだけ使う）
set -g @plugin 'accessd/tmux-agent-indicator'
set -g @agent-indicator-border-enabled 'off'
set -g @agent-indicator-background-enabled 'off'
set -g @agent-indicator-notification-enabled 'off'

# ヤンクの改善（システムクリップボードとの統合）
set -g @plugin 'tmux-plugins/tmux-yank'

# URL開く (Prefix + u でfzf選択)
set -g @plugin 'wfxr/tmux-fzf-url'

# セッション永続化
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect: Neovimのセッションも復元
set -g @resurrect-strategy-nvim 'session'
# tmux-resurrect: ペインの内容も復元
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum: 自動保存（15分ごと）
set -g @continuum-save-interval '15'
# tmux-continuum: tmux起動時に自動復元
set -g @continuum-restore 'on'

# 重要: status off でもcontinuumの自動保存を動かすためのフック
# status-rightはstatus offだと実行されないため、以下の方法で代替:
# 1. イベントフックで重要なタイミングで保存
set-hook -g client-attached 'run-shell -b "~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh"'
set-hook -g after-split-window 'run-shell -b "~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh"'
set-hook -g after-new-window 'run-shell -b "~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh"'
set-hook -g after-new-session 'run-shell -b "~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh"'
set-hook -g session-closed 'run-shell -b "~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh"'
# 2. バックグラウンドで定期保存スクリプトを起動（tmuxサーバー起動時に1回だけ）
run-shell -b 'pgrep -f "tmux-autosave.sh" >/dev/null || ~/.dotfiles/scripts/tmux-autosave.sh 900 &'

# tmux-claude: セッション復元対象にtmcを追加
set -g @resurrect-processes 'tmc'

# tmux-claude plugin (local)
run-shell ~/.dotfiles/tmux-claude/tmc.tmux

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
